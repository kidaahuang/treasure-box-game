services:
  - type: web
    name: treasure-game-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: http://localhost:3000,https://kidaahuang.github.io
      - key: DB_PATH
        value: ./data/treasure.db
      - key: NODE_ENV
        value: production
